<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Muse | Schedule</title>
    <style>
        :root { --navy: #001e43; --blue: #00a8ff; }
        body { background: var(--navy); color: white; font-family: sans-serif; margin: 0; padding: 20px; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .card { background: #002d62; border-radius: 20px; padding: 20px; margin-bottom: 15px; border-left: 5px solid var(--blue); position: relative; }
        .time { color: var(--blue); font-weight: bold; font-size: 16px; }
        .name { font-size: 20px; display: block; margin: 8px 0; font-weight: 500; }
        .meta { font-size: 13px; color: #81a1c1; }
        .dur-tag { position: absolute; top: 20px; right: 20px; background: rgba(0,168,255,0.1); color: var(--blue); padding: 4px 8px; border-radius: 5px; font-size: 11px; }
    </style>
</head>
<body>
    <div class="header">
        <a href="/" style="color:var(--blue); text-decoration:none; font-weight:bold;">← กลับหน้าจอง</a>
        <h2 style="letter-spacing:5px; margin:0; font-weight:200;">MUSE</h2>
    </div>
    <div id="list">กำลังโหลดตาราง...</div>
    <script>
        async function load() {
            try {
                const res = await fetch('/api/bookings');
                const data = await res.json();
                const container = document.getElementById('list');
                if(data.length <= 1) { container.innerHTML = "ยังไม่มีข้อมูลการจอง"; return; }
                container.innerHTML = '';
                
                // Show latest first
                data.slice(1).reverse().forEach(row => {
                    const d = new Date(row[2]).toLocaleDateString('th-TH', {day:'numeric', month:'short'});
                    container.innerHTML += `
                        <div class="card">
                            <div class="dur-tag">${row[6]} ชม.</div>
                            <span class="time">${row[3]} - ${row[4]} | ${d}</span>
                            <span class="name">${row[1]}</span>
                            <div class="meta">📱 ${row[5] || '-'} <br> 📝 ${row[7] || '-'}</div>
                        </div>`;
                });
            } catch(e) { document.getElementById('list').innerHTML = "โหลดข้อมูลล้มเหลว"; }
        }
        load();
    </script>
</body>
</html>
