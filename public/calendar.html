<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Muse | Schedule</title>
    <style>
        :root { --bg: #121212; --card: #1c1c1e; --blue: #0a84ff; --red: #ff453a; }
        * { touch-action: manipulation; box-sizing: border-box; }
        body { background: var(--bg); color: white; font-family: -apple-system, sans-serif; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; }
        
        .header { width: 100%; max-width: 350px; display: flex; justify-content: space-between; padding: 10px 0; position: sticky; top: 0; background: var(--bg); z-index: 10; border-bottom: 1px solid #2c2c2e; }
        .toggle { display: flex; background: #2c2c2e; border-radius: 8px; padding: 2px; }
        .t-btn { padding: 6px 14px; border: none; border-radius: 6px; background: transparent; color: #8e8e93; font-size: 12px; outline: none; }
        .t-btn.active { background: #48484a; color: white; }

        /* Timeline Layout */
        .timeline { width: 100%; max-width: 350px; position: relative; padding-left: 25px; border-left: 2px solid #ffffff; margin-top: 25px; margin-left: 10px; min-height: 80vh; }
        
        /* Column C (Date Header) */
        .date-header { color: var(--blue); font-size: 14px; font-weight: bold; margin: 25px 0 10px 0; letter-spacing: 1px; display: block; }
        
        /* Card Design */
        .card { background: var(--card); border-radius: 20px; padding: 18px; margin-bottom: 15px; position: relative; border: 1px solid rgba(255,255,255,0.03); width: 100%; display: flex; flex-direction: column; }
        
        .card-row-top { display: flex; justify-content: space-between; align-items: center; padding-right: 45px; margin-bottom: 12px; }
        .col-b { font-size: 18px; font-weight: bold; }
        .phone-btn { font-size: 13px; color: white; text-decoration: none; border: 1px solid white; padding: 4px 10px; border-radius: 10px; font-weight: bold; display: flex; align-items: center; gap: 6px; }

        .card-row-bottom { display: flex; justify-content: space-between; align-items: center; padding-right: 45px; }
        .col-d { font-size: 17px; font-weight: 500; color: #ffffff; }
        .col-h { font-size: 13px; color: #aaaaaa; max-width: 150px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        
        .trash { background: none; border: none; color: white; font-size: 24px; position: absolute; top: 50%; right: 15px; transform: translateY(-50%); cursor: pointer; }

        .cal-box { width: 100%; max-width: 350px; background: var(--card); border-radius: 20px; padding: 15px; margin-bottom: 20px; }
        .m-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; text-align: center; }
        .day { aspect-ratio: 1/1; display: flex; align-items: center; justify-content: center; border-radius: 50%; font-size: 13px; }
        .s-some { background: rgba(255, 214, 10, 0.2); color: #ffd60a; border: 1px solid #ffd60a; }
        .s-full { background: rgba(255, 69, 58, 0.2); color: var(--red); border: 1px solid var(--red); }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="header">
        <a href="/" style="color:var(--blue); text-decoration:none; font-size:13px; font-weight:bold;">← หน้าจอง</a>
        <div class="toggle">
            <button class="t-btn active" id="bL" onclick="v('L')">รายการ</button>
            <button class="t-btn" id="bM" onclick="v('M')">ปฏิทิน</button>
        </div>
    </div>

    <div id="LView" class="timeline"></div>
    <div id="MView" class="hidden"></div>

    <script>
        let bookings = [];

        // ENHANCED TIME FIX: This handles Strings, ISO Dates, and Decimal Time from Sheets
        function formatTime(val) {
            if (!val) return "-";
            
            // 1. If it's an ISO string like "2024-01-01T15:00:00Z"
            if (typeof val === 'string' && val.includes('T')) {
                let t = val.split('T')[1];
                return t.split(':').slice(0,2).join('.');
            }
            
            // 2. If it's already a clean string like "15:00"
            if (typeof val === 'string' && val.includes(':')) {
                return val.replace(':', '.');
            }

            // 3. If it's a number (Google Sheets time decimal), convert it to HH.mm
            if (typeof val === 'number') {
                let totalMinutes = Math.round(val * 24 * 60);
                let hours = Math.floor(totalMinutes / 60);
                let minutes = totalMinutes % 60;
                return `${hours.toString().padStart(2, '0')}.${minutes.toString().padStart(2, '0')}`;
            }

            return val;
        }

        async function load() {
            try {
                const res = await fetch('/api/bookings');
                bookings = await res.json();
                renderList();
                renderCalendar();
            } catch(e) { console.error("Load failed", e); }
        }

        function v(t) {
            document.getElementById('LView').classList.toggle('hidden', t !== 'L');
            document.getElementById('MView').classList.toggle('hidden', t !== 'M');
            document.getElementById('bL').classList.toggle('active', t === 'L');
            document.getElementById('bM').classList.toggle('active', t === 'M');
        }

        function renderList() {
            const cont = document.getElementById('LView'); cont.innerHTML = '';
            let lastD = "";
            
            // Skip header row
            const data = bookings.slice(1);

            data.forEach(r => {
                const [ts, name, date, start, end, mob, dur, note] = r;
                
                // Format Date for Header
                const datePart = date ? date.split('T')[0] : "";
                const dObj = new Date(datePart);
                const dStr = dObj.toLocaleDateString('th-TH', {day:'numeric', month:'long'});
                
                if (datePart !== lastD && datePart !== "") {
                    cont.innerHTML += `<div class="date-header" id="date-${datePart}">${dStr}</div>`;
                    lastD = datePart;
                }
                
                const displayTime = formatTime(start);
                
                cont.innerHTML += `
                    <div class="card">
                        <div class="card-row-top">
                            <span class="col-b">${name || 'ไม่ระบุชื่อ'}</span>
                            <a href="tel:${mob}" class="phone-btn">📞 ${mob || 'N/A'}</a>
                        </div>
                        <div class="card-row-bottom">
                            <span class="col-d">${displayTime} น.</span>
                            <span class="col-h">${note || '-'}</span>
                        </div>
                        <button class="trash" onclick="del('${name}','${start}','${dStr}','${datePart}')">🗑️</button>
                    </div>`;
            });
        }

        function renderCalendar() {
            const cont = document.getElementById('MView'); cont.innerHTML = '';
            const now = new Date();
            const year = now.getFullYear();
            for(let m=now.getMonth(); m<12; m++) {
                const box = document.createElement('div'); box.className = 'cal-box';
                const grid = document.createElement('div'); grid.className = 'm-grid';
                const days = new Date(year, m+1, 0).getDate();
                box.innerHTML = `<div style="text-align:center; color:var(--blue); margin-bottom:10px; font-weight:bold;">${new Date(year, m).toLocaleDateString('th-TH', {month:'long'})}</div>`;
                for(let d=1; d<=days; d++) {
                    const ds = `${year}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                    const count = bookings.filter(b => b[2] && b[2].includes(ds)).length;
                    let cls = "";
                    if(count >= 4) cls = "s-full"; else if(count > 0) cls = "s-some";
                    grid.innerHTML += `<div class="day ${cls}" ${count > 0 ? `onclick="go('${ds}')"` : ''}>${d}</div>`;
                }
                box.appendChild(grid); cont.appendChild(box);
            }
        }

        function go(d) { v('L'); setTimeout(() => document.getElementById(`date-${d}`)?.scrollIntoView({behavior:'smooth'}), 100); }
        
        async function del(n, s, dStr, dRaw) {
            if(confirm(`ต้องการลบการจอง ${n} , ${formatTime(s)} , ${dStr}?`)) {
                await fetch('/api/reserve', {
                    method:'POST', 
                    headers:{'Content-Type':'application/json'},
                    body:JSON.stringify({action:'delete', name:n, startTime:s, datePart: dRaw})
                });
                location.reload();
            }
        }
        load();
    </script>
</body>
</html>
