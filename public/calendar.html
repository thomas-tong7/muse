<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Muse | ปฏิทิน</title>
    <link href='https://cdn.jsdelivr.net/npm/fullcalendar@5.11.3/main.min.css' rel='stylesheet' />
    <script src='https://cdn.jsdelivr.net/npm/fullcalendar@5.11.3/main.min.js'></script>
    <style>
        body { background: #001e43; color: white; font-family: -apple-system, sans-serif; margin: 0; padding: 10px; }
        .header { display: flex; justify-content: space-between; align-items: center; padding: 10px 5px; }
        .back-btn { color: #00a8ff; text-decoration: none; font-size: 16px; font-weight: bold; }
        .calendar-card { background: white; border-radius: 20px; padding: 10px; height: 85vh; overflow: hidden; }
        /* Fix calendar text color for mobile visibility */
        .fc { color: #001e43; }
        .fc-toolbar-title { font-size: 16px !important; }
        .fc-button { background: #00a8ff !important; border: none !important; text-transform: capitalize !important; }
    </style>
</head>
<body>
    <div class="header">
        <a href="/" class="back-btn">← ย้อนกลับ</a>
        <h3 style="margin:0; letter-spacing:2px;">MUSE CALENDAR</h3>
    </div>
    <div class="calendar-card">
        <div id='calendar' style="height: 100%;"></div>
    </div>
    <script>
        document.addEventListener('DOMContentLoaded', async function() {
            try {
                const res = await fetch('/api/bookings');
                const rawData = await res.json();
                
                // Clean the data: Skip headers and format dates
                const events = rawData.slice(1).map(row => {
                    // row[2] is Date, row[3] is StartTime, row[4] is EndTime
                    let datePart = row[2].split('T')[0]; 
                    return {
                        title: row[1], // Name
                        start: datePart + 'T' + row[3],
                        end: datePart + 'T' + row[4],
                        backgroundColor: '#00a8ff',
                        borderColor: '#001e43'
                    };
                });

                var calendarEl = document.getElementById('calendar');
                var calendar = new FullCalendar.Calendar(calendarEl, {
                    initialView: 'timeGridDay',
                    headerToolbar: { left: 'prev,next', center: 'title', right: 'timeGridDay,dayGridMonth' },
                    events: events,
                    locale: 'th',
                    allDaySlot: false,
                    slotMinTime: '06:00:00',
                    height: '100%',
                    handleWindowResize: true
                });
                calendar.render();
            } catch (e) { console.error("Calendar Load Error", e); }
        });
    </script>
</body>
</html>
