<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Muse | จองคิว</title>
    <style>
        :root { --muse-navy: #001e43; --muse-blue: #00a8ff; --text-muted: #81a1c1; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--muse-navy); color: white; font-family: sans-serif; margin: 0; padding: 15px; display: flex; justify-content: center; min-height: 100vh; }
        .muse-card { width: 100%; max-width: 450px; background: #002d62; padding: 25px; border-radius: 30px; border: 1px solid rgba(0,168,255,0.2); box-shadow: 0 15px 40px rgba(0,0,0,0.5); align-self: center; }
        .logo { text-align: center; font-size: 32px; font-weight: 200; letter-spacing: 12px; margin-bottom: 30px; color: var(--muse-blue); }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 6px; font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; }
        input, select, textarea { width: 100%; padding: 15px; border-radius: 14px; border: 2px solid #1e3a5f; background: #001e43; color: white; font-size: 16px; outline: none; }
        input:focus { border-color: var(--muse-blue); }
        .flex-row { display: flex; gap: 10px; }
        .slot-info { background: rgba(0,168,255,0.1); padding: 15px; border-radius: 16px; text-align: center; margin: 20px 0; border: 1px dashed var(--muse-blue); }
        #timeRange { font-weight: bold; color: var(--muse-blue); font-size: 20px; }
        .btn-reserve { width: 100%; padding: 18px; background: var(--muse-blue); color: white; border: none; border-radius: 16px; font-weight: bold; font-size: 18px; margin-bottom: 15px; }
        .nav-link { color: var(--text-muted); text-decoration: none; font-size: 14px; display: block; text-align: center; padding: 10px; border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; }
    </style>
</head>
<body>
    <div class="muse-card">
        <div class="logo">MUSE</div>
        <div class="form-group"><label>ชื่อผู้จอง</label><input type="text" id="name" placeholder="ระบุชื่อ"></div>
        <div class="form-group"><label>เบอร์โทรศัพท์</label><input type="tel" id="mobile" placeholder="08x-xxxxxxx"></div>
        <div class="form-group"><label>วันที่</label><input type="date" id="date"></div>
        <div class="flex-row">
            <div style="flex: 2;"><label>เวลาเริ่ม</label><input type="time" id="startTime" oninput="updateRange()"></div>
            <div style="flex: 1.5;"><label>ระยะเวลา</label>
                <select id="duration" onchange="updateRange()">
                    <option value="1">1 ชม.</option><option value="2" selected>2 ชม.</option>
                    <option value="3">3 ชม.</option><option value="4">4 ชม.</option>
                </select>
            </div>
        </div>
        <div class="form-group" style="margin-top:10px;"><label>หมายเหตุ</label><textarea id="notes" rows="2"></textarea></div>
        <div class="slot-info">
            <div style="font-size: 10px; color: var(--text-muted); margin-bottom: 4px;">สรุปเวลาที่จอง</div>
            <span id="timeRange">กรุณาเลือกเวลา</span>
        </div>
        <button class="btn-reserve" onclick="submitToMuse()">ยืนยันการจอง</button>
        <a href="/calendar.html" class="nav-link">📅 ตารางการจอง (CALENDAR)</a>
    </div>
    <script>
        function updateRange() {
            const start = document.getElementById('startTime').value;
            const dur = parseInt(document.getElementById('duration').value);
            if (!start) return;
            let [h, m] = start.split(':');
            let endH = (parseInt(h) + dur) % 24;
            let endStr = `${String(endH).padStart(2, '0')}:${m}`;
            document.getElementById('timeRange').innerText = `${start} — ${endStr}`;
            return endStr;
        }
        async function submitToMuse() {
            const payload = {
                name: document.getElementById('name').value,
                mobile: document.getElementById('mobile').value,
                date: document.getElementById('date').value,
                startTime: document.getElementById('startTime').value,
                endTime: updateRange(),
                duration: document.getElementById('duration').value,
                notes: document.getElementById('notes').value
            };
            if (!payload.name || !payload.date || !payload.startTime) return alert("กรุณากรอกข้อมูลให้ครบ");
            try {
                await fetch('/api/reserve', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(payload) });
                alert("จองสำเร็จ!"); location.reload();
            } catch (err) { alert("เกิดข้อผิดพลาด"); }
        }
    </script>
</body>
</html>
